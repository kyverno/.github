# Reusable workflow — update PR branches that are behind their base branch.
#
# Usage (from a consumer repo):
#
#   jobs:
#     update:
#       uses: kyverno/.github/.github/workflows/pr-branch-updater.yml@main
#       secrets:
#         APP_CLIENT_ID: ${{ secrets.PR_UPDATER_APP_CLIENT_ID }}
#         APP_PRIVATE_KEY: ${{ secrets.PR_UPDATER_APP_PRIVATE_KEY }}
#
# Inputs:
#   base_branch — only update PRs targeting this branch.
#                 Defaults to the repository's default branch.
#
# Required secrets:
#   APP_CLIENT_ID — GitHub App client ID used to mint an installation token.
#   APP_PRIVATE_KEY — GitHub App private key paired with APP_CLIENT_ID.
#
# The workflow iterates every non-draft open PR, fetches its full record to get
# a reliable mergeable_state (the bulk list endpoint returns "unknown"), and
# calls the update-branch API for each PR whose state is "behind".
# Per-PR failures are non-fatal: the job logs them and continues.
# The job exits non-zero only if every attempted update encountered an
# unexpected error (i.e. the total unexpected-failure count is > 0).

name: PR Branch Auto-Updater

on:
  workflow_call:
    inputs:
      base_branch:
        description: >-
          Only update PRs targeting this branch.
          Leave empty to use the repository default branch.
        required: false
        type: string
        default: ""
    secrets:
      APP_CLIENT_ID:
        description: >-
          GitHub App client ID used to mint a short-lived installation token.
        required: true
      APP_PRIVATE_KEY:
        description: >-
          GitHub App private key paired with APP_CLIENT_ID.
        required: true

permissions: {}

jobs:
  update-pr-branches:
    name: Update out-of-date PR branches
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out shared scripts
        # Sparse-checkout only the scripts/ directory from kyverno/.github so
        # the workspace stays clean. Pin to a tag/SHA for production stability.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: kyverno/.github
          ref: main
          path: .kyverno-github
          sparse-checkout: scripts
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Normalize GitHub App private key
        id: normalize-key
        shell: bash
        env:
          RAW_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          key="$RAW_APP_PRIVATE_KEY"
          # Support secrets saved with escaped newlines.
          key="${key//\\n/$'\n'}"

          if ! printf '%s' "$key" | grep -Eq 'BEGIN (RSA |EC |)PRIVATE KEY'; then
            # Support secrets saved as base64-encoded PEM.
            decoded="$(printf '%s' "$RAW_APP_PRIVATE_KEY" | tr -d '[:space:]' | base64 --decode 2>/dev/null || true)"
            decoded="${decoded//\\n/$'\n'}"
            if printf '%s' "$decoded" | grep -Eq 'BEGIN (RSA |EC |)PRIVATE KEY'; then
              key="$decoded"
            fi
          fi

          if ! printf '%s' "$key" | grep -Eq 'BEGIN (RSA |EC |)PRIVATE KEY'; then
            echo "APP_PRIVATE_KEY does not look like a valid PEM private key." >&2
            echo "Store the key exactly as downloaded from the GitHub App settings," >&2
            echo "or as base64-encoded PEM content." >&2
            exit 1
          fi

          echo "::add-mask::$key"
          {
            echo "private_key<<EOF"
            printf '%s\n' "$key"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ steps.normalize-key.outputs.private_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Find and update behind PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          # Use the caller's explicit base branch or the repo default branch.
          # github.event.repository.default_branch is available on workflow_call.
          TARGET_BASE: ${{ inputs.base_branch || github.event.repository.default_branch }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: bash .kyverno-github/scripts/update-pr-branches.sh
